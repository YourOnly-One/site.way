# Translations for Philippine English
# https://gohugo.io/content-management/multilingual/#translation-of-strings

[toggleMenu]
  other = "Toggle Menu"

[darkMode]
  other = "Dark Mode"

[list]
  [list.page]
    one = "{{ .Count }} page"
    other = "{{ .Count }} pages"
  [list.section]
    other = "Section"
  [list.subsection]
    one = "Subsection"
    other = "Subsections"

[article]
  [article.back]
    other = "Back"
  [article.tableOfContents]
    other = "Table of Contents"
  [article.relatedContents]
    other = "Related contents"
  [article.lastUpdatedOn]
    other = "Last updated on"
  [article.readingTime]
    one = "1 minute read"
    other = "{{ .Count }} minutes read"

[notFound]
  [notFound.title]
    other = "Not Found"
  [notFound.subtitle]
    other = "This page does not exist."

[widget]
  [widget.archives]
    [widget.archives.title]
      other = "Archives"
    [widget.archives.more]
      other = "More"
  [widget.tagCloud]
    [widget.tagCloud.title]
      other = "Tags"

[search]
  [search.title]
    other = "Search"
  [search.placeholder]
    other = "Type something…"
  [search.resultTitle]
    other = "#PAGES_COUNT pages (#TIME_SECONDS seconds)"

[footer]
  [footer.builtWith]
    other = "Built with {{ .Generator }}"
  [footer.designedBy]
    other = "Theme {{ .Theme }} designed by {{ .DesignedBy }}"


