<section class="widget tagCloud">
    {{- /* YourOnly.One: no icon
    <div class="widget-icon">
        {{ partial "helper/icon" "tag" }}
    </div>
    */ -}}
    <h2 class="widget-title section-title">{{ T "allSeries" }}</h2>

    <div class="tagCloud-tags">
        {{ range first .Site.Params.widgets.seriesCloud.limit .Site.Taxonomies.series.ByCount }}
            <a href="{{ .Page.RelPermalink }}" class="font_size_{{ .Count }}">
                {{ .Page.Title }}
            </a>
        {{ end }}
    </div>
</section>
